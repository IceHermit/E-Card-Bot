rules: |
  ## 🃏 E-Card Rules
  
  * **Each side gets 5 cards**, out of which 4 are Citizen 🟦, and 1 is either Slave 🟥 or Emperor 🟩.
  * **Both sides** then have to choose 1 card and play it against the other side every turn.
  
  * **Win Conditions:**
    * If both sides choose Citizen 🟦, it's a tie.
    * Emperor 🟩 beats Citizen 🟦.
    * Citizen 🟦 beats Slave 🟥.
    * Slave 🟥 beats Emperor 🟩.
  
  * If neither side picks slave or emperor until turn 5, the game ends and the slave side automatically wins.
  * Minimum bet is 100 debloons


